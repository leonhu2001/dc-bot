{% extends "layout.html" %}

{% block page_title %}{{ title }}{% endblock %}

{% block content %}
    <div class="panel">
        <h2>{{ title }}</h2>
        <p>{{ message }}</p>

        <div class="actions">
            <a class="button" href="/">回登入頁</a>

            {% if user %}
                <a class="button secondary" href="/auth/logout">登出</a>
            {% endif %}
        </div>
    </div>
{% endblock %}
